<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Portal PIPRO · Gardner Denver</title>
<link rel="stylesheet" href="gd-theme.css?v=20260618"/>
<style>
html, body { height: 100%; overflow: hidden; }
body { background: var(--gd-50); }

/* Header del portal (sobrescribe altura para acomodar logo grande) */
.gd-shell-header { height: 68px; padding: 0 22px; }

/* SVG logo: ancho fijo para coherencia entre páginas */
.gd-logo svg { height: 36px; }

/* Tabs altura matched al header */
.gd-tab { height: 68px; }

/* Main = área de iframes */
main {
  position: relative;
  height: calc(100vh - 68px);
  overflow: hidden;
  background: var(--gd-50);
}

iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; border: none;
  opacity: 0; pointer-events: none;
  transition: opacity .18s ease;
  background: var(--gd-50);
}
iframe.active { opacity: 1; pointer-events: auto; }

/* Loader centrado, look corporativo claro */
.gd-loader {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  color: var(--gd-500); font-size: 13px;
  font-weight: 500;
}
.gd-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--gd-200);
  border-top-color: var(--gd-red);
  border-radius: 50%;
  animation: gd-spin .8s linear infinite;
}
@keyframes gd-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="gd-shell-header">
  <!-- Logo Gardner Denver oficial (SVG inline, escalable) -->
  <a class="gd-logo" href="#" onclick="showTab('cotizador');return false;" title="Portal PIPRO · Gardner Denver">
    <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg" aria-label="Gardner Denver">
      <text x="0" y="24"
            font-family="Inter, Arial, sans-serif"
            font-weight="900"
            font-size="26"
            letter-spacing="-1"
            fill="#1A1A1F">Gardner</text>
      <rect x="0" y="29" width="200" height="3.5" fill="#C8102E"/>
      <text x="0" y="55"
            font-family="Inter, Arial, sans-serif"
            font-weight="900"
            font-size="26"
            letter-spacing="-1"
            fill="#1A1A1F">Denver</text>
    </svg>
    <span class="gd-logo-sub">Portal PIPRO</span>
  </a>

  <nav class="gd-shell-nav" style="margin-left: 20px;">
    <button class="gd-tab active" data-tab="cotizador" onclick="showTab('cotizador')">
      <span class="gd-tab-icon">📋</span> Cotizador
    </button>
    <button class="gd-tab" data-tab="gantt" onclick="showTab('gantt')">
      <span class="gd-tab-icon">📅</span> Gantt
    </button>
    <button class="gd-tab" data-tab="requisiciones" onclick="showTab('requisiciones')">
      <span class="gd-tab-icon">📦</span> Requisiciones
    </button>
    <button class="gd-tab" data-tab="presiones" onclick="showTab('presiones')">
      <span class="gd-tab-icon">🔵</span> Caídas de Presión
    </button>
    <button class="gd-tab" data-tab="electrico" onclick="showTab('electrico')">
      <span class="gd-tab-icon">⚡</span> Selección Eléctrica
    </button>
  </nav>

  <div class="gd-shell-version">PIPRO v2.2 · build 20260618</div>
</header>

<main id="main">
  <!-- Cotizador carga de inmediato (pestaña activa por defecto) -->
  <iframe id="frame-cotizador" src="cotizador.html?v=20260618" class="active"></iframe>
  <!-- Resto: carga diferida (data-src). ?v= = cache-bust -->
  <iframe id="frame-gantt"         data-src="gantt.html?v=20260618"></iframe>
  <iframe id="frame-requisiciones" data-src="requisiciones.html?v=20260618"></iframe>
  <iframe id="frame-presiones"     data-src="presiones.html?v=20260618"></iframe>
  <iframe id="frame-electrico"     data-src="electrico.html?v=20260618"></iframe>

  <div class="gd-loader" id="loader" style="display:none">
    <div class="gd-spinner"></div>
    <span id="loader-txt">Cargando…</span>
  </div>
</main>

<script>
const NAMES = {
  cotizador:    'Cotizador PIPRO',
  gantt:        'Generador de Gantt',
  requisiciones:'Requisiciones',
  presiones:    'Caídas de Presión',
  electrico:    'Selección Eléctrica',
};
const LOADER_LABELS = {
  cotizador:    'Cargando cotizador…',
  gantt:        'Cargando generador de Gantt…',
  requisiciones:'Cargando módulo de requisiciones…',
  presiones:    'Cargando módulo de presiones…',
  electrico:    'Cargando calculadora eléctrica…',
};

function showTab(name) {
  // Actualizar botones
  document.querySelectorAll('.gd-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name)
  );

  const frame = document.getElementById('frame-' + name);

  // Carga diferida: asignar src solo la primera vez
  if (frame.dataset.src) {
    showLoader(LOADER_LABELS[name]);
    // Red de seguridad: si el iframe tarda más de 2.5s en disparar 'load',
    // ocultamos el loader para que el usuario vea el módulo en cuanto el HTML
    // y los scripts críticos estén listos.
    let hidden = false;
    const hideOnce = () => { if (!hidden) { hidden = true; hideLoader(); } };
    const safety = setTimeout(hideOnce, 2500);
    frame.addEventListener('load', () => { clearTimeout(safety); hideOnce(); }, { once: true });
    frame.src = frame.dataset.src;
    delete frame.dataset.src;
  }

  // Mostrar/ocultar iframes
  document.querySelectorAll('iframe').forEach(f =>
    f.classList.toggle('active', f.id === 'frame-' + name)
  );

  document.title = NAMES[name] + ' · Gardner Denver';
}

function showLoader(msg) {
  const l = document.getElementById('loader');
  document.getElementById('loader-txt').textContent = msg;
  l.style.display = 'flex';
}
function hideLoader() {
  document.getElementById('loader').style.display = 'none';
}
</script>
</body>
</html>
